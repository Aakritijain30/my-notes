<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Notes App</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <header>
        <h1>My Notes</h1>
        <p>Capture your thoughts, ideas, and reminders</p>
    </header>

    <div class="container">

      
        <div class="tabs">
            <button class="tab-btn active" data-tab="notes">
                <svg width="16" height="16" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round" viewBox="0 0 24 24"><path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"/><polyline points="14 2 14 8 20 8"/><line x1="16" y1="13" x2="8" y2="13"/><line x1="16" y1="17" x2="8" y2="17"/></svg>
                My Notes <span class="tab-badge" id="badgeNotes">0</span>
            </button>
            <button class="tab-btn" data-tab="trash">
                <svg width="16" height="16" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round" viewBox="0 0 24 24"><polyline points="3 6 5 6 21 6"/><path d="M19 6l-1 14a2 2 0 0 1-2 2H8a2 2 0 0 1-2-2L5 6"/><path d="M10 11v6"/><path d="M14 11v6"/><path d="M9 6V4a1 1 0 0 1 1-1h4a1 1 0 0 1 1 1v2"/></svg>
                Trash <span class="tab-badge" id="badgeTrash">0</span>
            </button>
        </div>


        <div class="search-bar">
            <svg width="18" height="18" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" viewBox="0 0 24 24"><circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/></svg>
            <input type="text" id="searchInput" placeholder="Search notes..." autocomplete="off">
            <button class="search-clear" id="searchClear" aria-label="Clear search">
                <svg width="16" height="16" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round" viewBox="0 0 24 24"><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></svg>
            </button>
        </div>

        
        <div class="note-input-card" id="noteInputCard">
            <input type="text" id="noteTitle" placeholder="Title" maxlength="80" autocomplete="off">
            <textarea id="noteBody" placeholder="Write your note here..." maxlength="1000"></textarea>
            <div class="input-footer">
                <span class="char-count" id="charCount">0 / 1000</span>
                <button class="btn-add" id="btnAdd" disabled>
                    <svg width="16" height="16" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round" viewBox="0 0 24 24"><line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/></svg>
                    Add Note
                </button>
            </div>
        </div>

        <div class="notes-header">
            <h2 id="sectionTitle">Saved Notes</h2>
            <button class="btn-empty-trash" id="btnEmptyTrash" style="display:none;">
                <svg width="14" height="14" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" viewBox="0 0 24 24"><polyline points="3 6 5 6 21 6"/><path d="M19 6l-1 14a2 2 0 0 1-2 2H8a2 2 0 0 1-2-2L5 6"/></svg>
                Empty Trash
            </button>
        </div>

        <div class="notes-grid" id="notesGrid"></div>
    </div>

    <div class="toast" id="toast"></div>

    <div class="modal-overlay" id="modalOverlay">
        <div class="modal">
            <div class="modal-icon red">
                <svg width="26" height="26" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" viewBox="0 0 24 24"><polyline points="3 6 5 6 21 6"/><path d="M19 6l-1 14a2 2 0 0 1-2 2H8a2 2 0 0 1-2-2L5 6"/><path d="M10 11v6"/><path d="M14 11v6"/><path d="M9 6V4a1 1 0 0 1 1-1h4a1 1 0 0 1 1 1v2"/></svg>
            </div>
            <h3 id="modalTitle">Delete this note?</h3>
            <p id="modalDesc">This action cannot be undone.</p>
            <div class="modal-actions">
                <button class="btn-cancel" id="btnCancel">Cancel</button>
                <button class="btn-confirm-delete" id="btnConfirm">Delete</button>
            </div>
        </div>
    </div>

    <script src="script.js"></script>
</body>
</html>
